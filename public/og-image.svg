<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@600;700;800&amp;family=JetBrains+Mono:wght@500&amp;family=Manrope:wght@500;600&amp;display=swap');
      .wordmark { font-family: 'Unbounded', 'Arial Black', sans-serif; font-weight: 800; }
      .tagline  { font-family: 'Manrope', Arial, sans-serif; font-weight: 500; }
      .mono     { font-family: 'JetBrains Mono', monospace; font-weight: 500; letter-spacing: 3px; }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c0d10"/>
      <stop offset="1" stop-color="#07080a"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- cyan accent bar -->
  <rect x="80" y="196" width="64" height="6" rx="3" fill="#3cd2f9"/>

  <!-- top meta -->
  <text x="80" y="96" class="mono" font-size="22" fill="#8a9099">ADREXIO · DIGITAL STUDIO · BG</text>

  <!-- wordmark -->
  <text x="76" y="330" class="wordmark" font-size="128" letter-spacing="-4" fill="#ffffff">
    <tspan fill="#ffffff">adre</tspan><tspan fill="#3cd2f9">x</tspan><tspan fill="#ffffff">io</tspan>
  </text>

  <!-- tagline -->
  <text x="80" y="410" class="tagline" font-size="34" fill="#c7ccd3">Модерни уебсайтове и дигитални решения</text>

  <!-- bottom hairline + url -->
  <line x1="80" y1="520" x2="1120" y2="520" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <text x="80" y="566" class="mono" font-size="22" fill="#8a9099">WWW.ADREXIO.COM</text>
  <text x="1120" y="566" class="tagline" font-size="24" fill="#c7ccd3" text-anchor="end">Уеб · Мобилни · UI/UX · SEO · AI</text>
</svg>
